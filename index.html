<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkRun</title>
    <link rel="stylesheet" href="styles.css">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>


</head>

<body>
    <div class="container-fluid p-1">
        <h1 class="text-center display-1">MilkRun</h1>
    </div>

    <ul class="nav nav-tabs container p-1">
        <li class="nav-item">
            <a class="nav-link active" id="as-tab" data-bs-toggle="tab" href="#as">Alaska Milk Run</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" id="ua-tab" data-bs-toggle="tab" href="#ua">United Island Hopper</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" id="info-tab" data-bs-toggle="tab" href="#info">Info</a>
        </li>
    </ul>
    <div class="tab-content container p-3">
        <div class="tab-pane active" id="as">
            <div class="btn-group" role="group" aria-label="Flight selection toggle group">

                <input type="radio" class="btn-check" name="asflightoptions" id="option1" autocomplete="off"
                    onclick="routeChange('as61')" checked>
                <label class="btn btn-secondary" for="option1">Flight 61</label>

                <input type="radio" class="btn-check" name="asflightoptions" id="option2" autocomplete="off"
                    onclick="routeChange('as62')">
                <label class="btn btn-secondary" for="option2">Flight 62</label>

                <input type="radio" class="btn-check" name="asflightoptions" id="option3" autocomplete="off"
                    onclick="routeChange('as64')">
                <label class="btn btn-secondary" for="option3">Flight 64</label>

                <input type="radio" class="btn-check" name="asflightoptions" id="option4" autocomplete="off"
                    onclick="routeChange('as65')">
                <label class="btn btn-secondary" for="option4">Flight 65</label>

                <input type="radio" class="btn-check" name="asflightoptions" id="option5" autocomplete="off"
                    onclick="routeChange('as66')">
                <label class="btn btn-secondary" for="option5">Flight 66</label>

                <input type="radio" class="btn-check" name="asflightoptions" id="option6" autocomplete="off"
                    onclick="routeChange('as67')">
                <label class="btn btn-secondary" for="option6">Flight 67</label>
            </div>

            <h3 id="route" class="text-center p-3">SEA&gt;JNU&gt;YAK&gt;CDV&gt;ANC</h3>

            <div class="text-center p-3">
                <label for="departuredate">Departure Date:</label>
                <input type="date" id="asdeparturedatepicker" name="departuredate" onchange="departureDateChange('AS')">
            </div>

            <div class="text-center p-3">
                <input type="checkbox" id="asawardcheckbox" name="asawardcheck" onchange="departureDateChange('AS')">
                <label for="asawardcheckbox">Search award bookings</label>
            </div>
            <div class="text-center p-3">

                <button class="btn btn-primary" id="asdeparturebutton" onclick="departureButtonClick('AS')" disabled>
                    <a href="#" id="asopenlink" class="text-white" target="_blank">View options on alaskaair.com</a>
                </button>

                <br>

                <code id="aslinkbox" hidden>link</code>
            </div>
        </div>
        <div class="tab-pane fade" id="ua">
            <h3>United Island Hopper </h3>
        </div>
        <div class="tab-pane fade" id="info">
            <h3>Info </h3>
        </div>
    </div>
</body>
<script src="script.js"></script>

</html>
