<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkRun</title>
    <link rel="stylesheet" href="styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container-fluid">
        <h1 class="text-center display-1">MilkRun</h1>
    </div>

    <ul class="nav nav-tabs">
        <li class="nav-item">
            <a class="nav-link active" data-bs-toggle="tab" href="#as">Alaska Milk Run</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-bs-toggle="tab" href="#ua">United Island Hopper</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-bs-toggle="tab" href="#info">Info</a>
        </li>
    </ul>
    <div class="tab-content">
        <div class="tab-pane active" id="as">
            <h3>Alaska Milk Run </h3>
            <div class="btn-group" role="group" aria-label="Flight selection toggle group">

                <input type="radio" class="btn-check" name="asflightoptions" id="option1" autocomplete="off" checked>
                <label class="btn btn-secondary" for="option1">Flight 61</label>

                <input type="radio" class="btn-check" name="asflightoptions" id="option2" autocomplete="off">
                <label class="btn btn-secondary" for="option2">Flight 62</label>

                <input type="radio" class="btn-check" name="asflightoptions" id="option3" autocomplete="off">
                <label class="btn btn-secondary" for="option3">Flight 64</label>

            </div>
        </div>
        <div class="tab-pane fade" id="ua">
            <h3>United Island Hopper </h3>
        </div>
        <div class="tab-pane fade" id="info">
            <h3>Info </h3>
        </div>
    </div>
</body>

</html>
